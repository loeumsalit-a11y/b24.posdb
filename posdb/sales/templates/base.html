<!-- sales/templates/base.html -->
<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}POS PRO{% endblock %}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;500;600;700;800&display=swap');

        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --primary-soft: rgba(99, 102, 241, 0.15);
            --bg: #0f172a;
            --sidebar-bg: #111827;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --white: #ffffff;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
            --sidebar-width: 260px;
        }

        body.light-mode {
            --bg: #f1f5f9;
            --sidebar-bg: #ffffff;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --primary-soft: rgba(99, 102, 241, 0.1);
        }

        body {
            font-family: 'Kantumruy Pro', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 2rem 1rem;
            position: fixed;
            height: 100vh;
            z-index: 1000;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0 1rem 3rem 1rem;
            text-decoration: none;
            color: var(--primary);
            font-size: 1.5rem;
            font-weight: 800;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex-grow: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.25rem;
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 700;
            border-radius: 12px;
            transition: all 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            color: var(--white);
            background: var(--primary);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .nav-item i { font-size: 1.2rem; }

        .sidebar-footer {
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }

        /* Main Content */
        .main-wrapper {
            margin-left: var(--sidebar-width);
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--primary-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--primary);
        }

        main {
            padding: 0 3rem 3rem 3rem;
            max-width: 1400px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 800;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-white {
            background: white;
            color: var(--primary);
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body class="dark-mode"> <!-- Default to dark as per screenshot -->

    <aside class="sidebar">
        <a href="/sales/" class="logo-area">
            <span style="font-size: 1.8rem;">🛒</span>
            <span>POS PRO</span>
        </a>

        <nav class="nav-links">
            <a href="/sales/" class="nav-item" id="nav-dashboard">
                <span>🏠</span> Dashboard
            </a>
            <a href="/sales/checkout/" class="nav-item" id="nav-checkout">
                <span>⚡</span> Checkout
            </a>
            <a href="/sales/products/" class="nav-item" id="nav-products">
                <span>📦</span> ផលិតផល
            </a>
            <a href="/sales/orders/" class="nav-item" id="nav-orders">
                <span>💵</span> ការបញ្ជាទិញ
            </a>
            <a href="/admin/" class="nav-item" target="_blank">
                <span>⚙️</span> បន្ទះគ្រប់គ្រង
            </a>
        </nav>

        <div class="sidebar-footer">
            <button id="theme-toggle" class="btn" style="width: 100%; background: var(--bg); color: var(--text-main); border: 1px solid var(--border); border-radius: 12px; font-size: 0.9rem;">
                🌙 Light Mode
            </button>
        </div>
    </aside>

    <div class="main-wrapper">
        <header>
            <div class="user-profile">
                <span>Loeum_salit</span>
                <div class="user-avatar">👤</div>
            </div>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        const body = document.body;
        const themeToggle = document.getElementById('theme-toggle');
        
        // Load theme from localStorage
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            body.classList.remove('dark-mode');
            body.classList.add('light-mode');
            themeToggle.innerHTML = '☀️ Dark Mode';
        }

        themeToggle.addEventListener('click', () => {
            if (body.classList.contains('dark-mode')) {
                body.classList.remove('dark-mode');
                body.classList.add('light-mode');
                localStorage.setItem('theme', 'light');
                themeToggle.innerHTML = '☀️ Dark Mode';
            } else {
                body.classList.remove('light-mode');
                body.classList.add('dark-mode');
                localStorage.setItem('theme', 'dark');
                themeToggle.innerHTML = '🌙 Light Mode';
            }
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
